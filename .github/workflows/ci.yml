name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm through Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Check formatting
        run: pnpm format:check

      - name: Validate control plane
        run: python scripts/validate-control-plane.py

      - name: Run control-plane tests
        run: python -m pytest tests/test_control_plane_bootstrap.py
