name: causalledger-local

services:
  postgres:
    image: postgres:17-alpine
    container_name: causalledger-postgres
    environment:
      POSTGRES_DB: ${CAUSALLEDGER_POSTGRES_DB:-causalledger_dev}
      POSTGRES_USER: ${CAUSALLEDGER_POSTGRES_USER:-causalledger}
      POSTGRES_PASSWORD: ${CAUSALLEDGER_POSTGRES_PASSWORD:-causalledger_local_password}
    ports:
      - "${CAUSALLEDGER_POSTGRES_HOST:-127.0.0.1}:${CAUSALLEDGER_POSTGRES_PORT:-5432}:5432"
    volumes:
      - causalledger-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  causalledger-postgres-data:
